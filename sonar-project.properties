# SonarQube project configuration for Angular frontend
# Used by: npx sonar-scanner (in Jenkinsfile)

sonar.projectKey=formini-frontend
sonar.projectName=formini-frontend
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/*.spec.ts,**/coverage/**,**/dist/**

# Test files
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

# TypeScript configuration
sonar.typescript.tsconfigPaths=tsconfig.sonar.json

# Coverage report generated by Karma
sonar.javascript.lcov.reportPaths=coverage/formini-app/lcov.info

# JUnit test results from Karma
sonar.testExecutionReportPaths=reports/junit/test-results.xml

# Encoding
sonar.sourceEncoding=UTF-8
