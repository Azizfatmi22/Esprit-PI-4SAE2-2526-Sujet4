spring.application.name=MS-COURSE
# Server Configuration
server.port=8083
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.info.enabled=true
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# File Upload Configuration
# Maximum file size (default: 500MB)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# MySQL Database Configuration - For Docker: use 'mysql' hostname, For local: use 'localhost'
spring.datasource.url=jdbc:mysql://localhost:3306/coursera?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&allowMultiQueries=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Add this to handle empty password
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=none
# Remove dialect line - let Hibernate auto-detect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.hikari.maximum-pool-size=10
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
file.upload.dir=${FILE_UPLOAD_DIR:./uploads}
spring.servlet.multipart.location=${file.upload.dir}
spring.servlet.multipart.enabled=true

# ======================
# SECURITY - JWT (DISABLED FOR NOW)
# ======================
# Keycloak JWT issuer URI
# spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/myrealm

# Disable Spring Security auto-configuration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
