# ========================
# Microservice Identity & Connectivity
# ========================
spring.application.name=MS-TRAINERHIRING
server.port=8084

# ========================
# Eureka Discovery Client
# ========================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

# ========================
# H2 Database Configuration
# ========================
spring.datasource.url=jdbc:h2:file:./data/partnerhiringdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================
# JPA / Hibernate
# ========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================
# File Upload Configuration
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# Swagger / OpenAPI
# ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ========================
# File Storage Path
# ========================
file.upload-dir=uploads/partners

# ========================
# Security / Keycloak
# ========================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://192.168.222.136:8180/realms/myrealm

