spring.application.name=MS-SessionMangement

# ===============================
# SERVER
# ===============================
server.port=8082

# ===============================
# DATABASE CONFIGURATION (WAMP MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://mysql-db:3306/session_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=


# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CONNECTION POOL
# ===============================
spring.datasource.hikari.maximum-pool-size=10

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
# Force l'utilisation de l'IP du Pod au lieu du hostname aléatoire de K8s
eureka.instance.prefer-ip-address=true

# Donne un ID unique à chaque instance (très important pour éviter les conflits)
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.client.register-with-eureka=true


spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/myrealm
management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.prometheus.enabled=true
spring.security.ignored=/actuator/**
