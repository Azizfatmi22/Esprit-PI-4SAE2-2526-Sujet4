server.port=8099
spring.application.name=MS-LIVECLASS

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/liveclassdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# Jackson JSON serialization configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

# Spring AI Ollama Configuration
# Optimized for llama3.2:1b - small but capable model
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2:1b
spring.ai.ollama.chat.options.temperature=0.8
spring.ai.ollama.chat.options.num-predict=800
spring.ai.ollama.chat.options.top-p=0.95
spring.ai.ollama.chat.options.repeat-penalty=1.2

# ======================
# SECURITY - JWT
# ======================
# Keycloak JWT issuer URI
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/myrealm

# Disable Spring Security auto-configuration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
