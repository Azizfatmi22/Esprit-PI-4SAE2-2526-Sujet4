spring.application.name=MS-LIVECLASS
server.port=8099

# =====================================================
# EUREKA
# =====================================================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka-server:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# =====================================================
# H2 DATABASE (embedded — no separate DB service needed)
# File-based so data survives pod restarts within the same run
# =====================================================
spring.datasource.url=jdbc:h2:file:./data/liveclassdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# =====================================================
# JACKSON
# =====================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

# =====================================================
# ACTUATOR
# =====================================================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.info.enabled=true
management.endpoint.health.show-details=always

# =====================================================
# SECURITY - KEYCLOAK OAUTH2
# issuer-uri → matches "iss" claim in the JWT exactly
# jwk-set-uri → internal K8s DNS so pod can reach Keycloak
# =====================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:30090/realms/myrealm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak-service:8080/realms/myrealm/protocol/openid-connect/certs
