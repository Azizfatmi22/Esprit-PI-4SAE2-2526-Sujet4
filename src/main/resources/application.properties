
# ===============================
# APPLICATION
# ===============================
spring.application.name=MSPathAndSchedule

# ===============================
# SERVER
# ===============================
server.port=8088

# ===============================
# DATABASE CONFIGURATION (MySQL WAMP)
# ===============================
spring.datasource.url=jdbc:mysql://mysql-db:3306/path_schedule_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CONNECTION POOL
# ===============================
spring.datasource.hikari.maximum-pool-size=10

# ===============================
# EUREKA CLIENT (SERVICE DISCOVERY)
# ===============================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
# Force l'utilisation de l'IP du Pod au lieu du hostname aléatoire de K8s
eureka.instance.prefer-ip-address=true

# Donne un ID unique à chaque instance (très important pour éviter les conflits)
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# ===============================
# SECURITY (KEYCLOAK / OAUTH2)
# ===============================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/myrealm
schedule.buffer.minutes=30
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
