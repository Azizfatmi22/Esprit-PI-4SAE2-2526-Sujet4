spring.application.name=MS-LIVECLASS-TEST
server.port=0

# Disable Eureka and Cloud Discovery in tests
spring.cloud.discovery.enabled=false
spring.cloud.config.enabled=false
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Disable Feign Eureka integration
spring.cloud.openfeign.client.config.default.connectTimeout=5000
spring.cloud.openfeign.client.config.default.readTimeout=5000

# Use in-memory H2 for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

# Spring AI Ollama Mock Properties (to satisfy bean creation)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama2

# Mock Security / Disable JWT validation
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/test
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/test/protocol/openid-connect/certs

