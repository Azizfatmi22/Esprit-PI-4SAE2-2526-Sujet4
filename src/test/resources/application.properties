spring.application.name=forum-service-test
spring.datasource.url=jdbc:h2:mem:forumdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.cloud.discovery.enabled=false
eureka.client.enabled=false
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test
app.mail.from=test@example.com
app.base-url=http://localhost:4200
app.api-url=http://localhost:8080/api
