# H2 Database Configuration for Tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration - Use Custom H2 Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Use custom dialect to remove ENGINE=InnoDB
spring.jpa.properties.hibernate.dialect=com.sessionmanagementservice.config.CustomH2Dialect

# Disable schema initialization
spring.sql.init.mode=never

# Additional H2 settings
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false