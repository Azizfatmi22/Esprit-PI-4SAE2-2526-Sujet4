<div class="container mt-4">
  <h2 class="mb-4">Liste des Évaluations</h2>
  <div class="list-group">
    <button
      *ngFor="let evaluation of evaluations"
      (click)="onSelectEvaluation(evaluation)"
      class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
    >
      <div>
        <strong>{{ evaluation.title }}</strong>
        <span
          class="badge"
          [ngClass]="
            evaluation.typeAssessment === 'QUIZ' ? 'bg-info' : 'bg-success'
          "
        >
          {{ evaluation.typeAssessment }}
        </span>
      </div>

      <div class="text-end">
        <small class="d-block text-muted"
          >Durée: {{ evaluation.duration }} min</small
        >
        <span class="btn btn-sm btn-outline-primary mt-1">Démarrer</span>
      </div>
    </button>
  </div>
</div>
