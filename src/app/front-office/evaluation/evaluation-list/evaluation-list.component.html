<div class="container">
  <div class="header">
    <h2>Évaluations</h2>
    <p class="subtitle">{{ evaluations.length }} évaluation(s) disponible(s)</p>
  </div>

  <div class="evaluations-list">
    <div
      *ngFor="let evaluation of evaluations"
      class="evaluation-card"
      (click)="onSelectEvaluation(evaluation)"
    >
      <div class="card-content">
        <div class="card-header">
          <div>
            <h3 class="title">{{ evaluation.title }}</h3>
            <span class="type-badge" [class.quiz]="evaluation.typeAssessment === 'QUIZ'">
              {{ evaluation.typeAssessment }}
            </span>
          </div>
          <button class="start-button" (click)="$event.stopPropagation();">
            Démarrer
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <div class="card-footer">
          <div class="duration">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
              <path d="M12 6V12L16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>{{ evaluation.duration }} minutes</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="evaluations.length === 0" class="empty-state">
    <p>Aucune évaluation disponible</p>
  </div>
</div>
