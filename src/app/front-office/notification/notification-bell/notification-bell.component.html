<div class="bell-container">

  <!-- Bouton cloche -->
  <button class="bell-btn" (click)="togglePanel()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    <span class="badge" *ngIf="(unreadCount$ | async) as count">
      {{ count > 9 ? '9+' : count }}
    </span>
  </button>

  <!-- Panel notifications -->
  <div class="notifications-panel" *ngIf="showPanel">

    <div class="panel-header">
      <h3>Notifications</h3>
      <button class="btn-read-all" (click)="markAllRead()">
        Tout marquer lu
      </button>
    </div>

    <div class="panel-body">

      <!-- Vide -->
      <div *ngIf="notifications.length === 0" class="empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <p>Aucune notification</p>
      </div>

      <!-- Liste -->
      <div
        *ngFor="let n of notifications"
        class="notif-item"
        [class.unread]="!n.isRead"
        (click)="markRead(n)">

        <span class="notif-icon">{{ getIcon(n.type) }}</span>

        <div class="notif-content">
          <p class="notif-title">{{ n.title }}</p>
          <p class="notif-msg">{{ n.message }}</p>
          <p class="notif-date">{{ n.createdAt | date:'dd/MM/yyyy HH:mm' }}</p>
        </div>

        <span class="unread-dot" *ngIf="!n.isRead"></span>
      </div>

    </div>
  </div>

  <!-- Overlay pour fermer en cliquant ailleurs -->
  <div class="overlay" *ngIf="showPanel" (click)="showPanel = false"></div>

</div>
