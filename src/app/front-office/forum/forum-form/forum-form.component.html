<div class="forum-form-container">
    <!-- Header Section -->
    <div class="header-section">
        <h1>{{ isEditMode ? 'Update Post' : 'Create New Post' }}</h1>
        <p class="subtitle">{{ isEditMode ? 'Edit your post details' : 'Share your ideas with the community' }}</p>
    </div>

    <!-- Loading State -->
    <div class="loading-state" *ngIf="loading && isEditMode">
        <div class="spinner"></div>
        <p>Loading post...</p>
    </div>

    <!-- Form -->
    <div class="form-card" *ngIf="!loading || !isEditMode">
        <form (ngSubmit)="saveForum()">
            <!-- Title Input -->
            <div class="input-group">
                <label for="title">
                    Title <span class="required">*</span>
                </label>
                <input id="title" type="text" [(ngModel)]="forum.title" name="title"
                    placeholder="Enter a descriptive title for your post" required />
            </div>

            <!-- Content Input -->
            <div class="input-group">
                <label for="content">
                    Content <span class="required">*</span>
                </label>
                <textarea id="content" [(ngModel)]="forum.content" name="content"
                    placeholder="Write the main content of your post..." rows="8" required></textarea>
                <span class="helper-text">Share your thoughts, questions, or ideas in detail</span>
            </div>

            <!-- Category Input -->
            <div class="input-group">
                <label for="category">
                    Category <span class="required">*</span>
                </label>
                <select id="category" [(ngModel)]="forum.category" name="category" required>
                    <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
                </select>
                <span class="helper-text">Select a category that best matches your post</span>
            </div>

            <!-- Image Upload Section (Static for now) -->
            <div class="input-group">
                <label for="image">
                    Image <span class="optional">(Optional - Static for now)</span>
                </label>

                <!-- Image Preview -->
                <div class="image-preview-container" *ngIf="imagePreview">
                    <img [src]="imagePreview" alt="Preview" class="image-preview" />
                    <button type="button" class="btn-remove-image" (click)="removeImage()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M18 6L6 18M6 6l12 12" stroke-width="2" stroke-linecap="round" />
                        </svg>
                        Remove Image
                    </button>
                </div>

                <!-- Image Upload Button -->
                <div class="image-upload-wrapper" *ngIf="!imagePreview">
                    <input type="file" id="image" accept="image/*" (change)="onImageSelected($event)" #fileInput
                        style="display: none" />
                    <button type="button" class="btn-upload-image" (click)="fileInput.click()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke-width="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" stroke-width="2" />
                            <polyline points="21 15 16 10 5 21" stroke-width="2" />
                        </svg>
                        <span>Upload Image</span>
                    </button>
                    <span class="helper-text">Supported formats: JPG, PNG, GIF (Max 5MB)</span>
                </div>
            </div>

            <!-- Meta Info (Read-only) -->
            <div class="form-row">
                <div class="input-group">
                    <label for="userId">Trainer Name</label>
                    <input id="userId" type="text" [value]="trainerName" readonly />
                </div>
                <div class="input-group">
                    <label for="formationId">Formation ID</label>
                    <input id="formationId" type="text" [(ngModel)]="forum.formationId" name="formationId" readonly />
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button type="button" class="btn-cancel" (click)="cancel()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M18 6L6 18M6 6l12 12" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    Cancel
                </button>
                <button type="submit" class="btn-save" [disabled]="loading">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" stroke-width="2" />
                        <polyline points="17 21 17 13 7 13 7 21" stroke-width="2" />
                        <polyline points="7 3 7 8 15 8" stroke-width="2" />
                    </svg>
                    {{ loading ? 'Saving...' : (isEditMode ? 'Update Post' : 'Create Post') }}
                </button>
            </div>
        </form>
    </div>
</div>
