<div class="sidebar" [class.collapsed]="isCollapsed" [class.mobile]="isMobile"
  [class.mobile-open]="!isCollapsed && isMobile">
  <!-- Overlay pour mobile -->
  <div class="mobile-overlay" *ngIf="!isCollapsed && isMobile" (click)="toggleSidebar()"></div>

  <!-- Header avec logo simple -->
  <div class="sidebar-header">
    <div class="logo-container">
      <!-- Logo minimaliste -->
      <div class="logo-minimal">
        <div class="logo-mark">
          <span>F</span>
        </div>
      </div>
      <div class="logo-text-wrapper" *ngIf="!isCollapsed">
        <span class="logo-text">Formini</span>
        <span class="logo-badge">Admin</span>
      </div>
    </div>

    <button class="toggle-btn" (click)="toggleSidebar()" [class.rotated]="isCollapsed">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
    </button>
  </div>

  <!-- Menu principal -->
  <div class="sidebar-menu">
    <!-- Section Dashboard -->
    <div class="menu-section">
      <div class="menu-section-label" *ngIf="!isCollapsed">PRINCIPAL</div>
      <div class="menu-items">
        <a *ngFor="let item of menuItems.slice(0, 1); let last = last" [routerLink]="item.route"
          routerLinkActive="active" #rla="routerLinkActive" [class.active]="rla.isActive"
          (mouseenter)="onItemHover(item.id)" (mouseleave)="onItemHover(null)" class="menu-item">
          <div class="menu-item-inner">
            <span class="menu-icon">{{ item.icon }}</span>
            <span class="menu-label" *ngIf="!isCollapsed">{{
              item.label
              }}</span>

            <!-- Tooltip pour version collapsed -->
            <div class="menu-tooltip" *ngIf="isCollapsed && hoveredItem === item.id">
              {{ item.label }}
            </div>
          </div>
          <div class="active-indicator" *ngIf="rla.isActive"></div>

          <!-- Ligne de séparation -->
          <div class="menu-item-divider" *ngIf="!last && !isCollapsed"></div>
        </a>
      </div>
    </div>

    <!-- Section Gestion -->
    <div class="menu-section">
      <div class="menu-section-label" *ngIf="!isCollapsed">MANAGEMENT</div>
      <div class="menu-items">
        <a *ngFor="let item of menuItems.slice(1, 10); let last = last" [routerLink]="item.route"
          routerLinkActive="active" #rla="routerLinkActive" [class.active]="rla.isActive"
          (mouseenter)="onItemHover(item.id)" (mouseleave)="onItemHover(null)" class="menu-item">
          <div class="menu-item-inner">
            <span class="menu-icon">{{ item.icon }}</span>
            <span class="menu-label" *ngIf="!isCollapsed">{{
              item.label
              }}</span>

            <!-- Tooltip pour version collapsed -->
            <div class="menu-tooltip" *ngIf="isCollapsed && hoveredItem === item.id">
              {{ item.label }}
            </div>
          </div>
          <div class="active-indicator" *ngIf="rla.isActive"></div>

          <!-- Ligne de séparation -->
          <div class="menu-item-divider" *ngIf="!last && !isCollapsed"></div>
        </a>
      </div>
    </div>

    <!-- Section Finance -->
    <div class="menu-section">
      <div class="menu-section-label" *ngIf="!isCollapsed">TRAINING & HIRING</div>
      <div class="menu-items">
        <a *ngFor="let item of menuItems.slice(10, 14); let last = last" [routerLink]="item.route"
          routerLinkActive="active" #rla="routerLinkActive" [class.active]="rla.isActive"
          (mouseenter)="onItemHover(item.id)" (mouseleave)="onItemHover(null)" class="menu-item">
          <div class="menu-item-inner">
            <span class="menu-icon">{{ item.icon }}</span>
            <span class="menu-label" *ngIf="!isCollapsed">{{
              item.label
              }}</span>

            <div class="menu-tooltip" *ngIf="isCollapsed && hoveredItem === item.id">
              {{ item.label }}
            </div>
          </div>
          <div class="active-indicator" *ngIf="rla.isActive"></div>

          <!-- Ligne de séparation -->
          <div class="menu-item-divider" *ngIf="!last && !isCollapsed"></div>
        </a>
      </div>
    </div>
  </div>

  <!-- Footer avec profil admin -->
  <div class="sidebar-footer">
    <!-- Version étendue -->
    <div class="admin-profile" *ngIf="!isCollapsed">
      <div class="profile-card">
        <div class="profile-avatar">
          <span>{{ admin.initials }}</span>
        </div>
        <div class="profile-info">
          <div class="profile-name">{{ admin.name }}</div>
          <div class="profile-role">{{ admin.role }}</div>
        </div>
        <button class="logout-btn" (click)="logout()" title="Déconnexion">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke-width="2" />
            <polyline points="16 17 21 12 16 7" stroke-width="2" />
            <line x1="21" y1="12" x2="9" y2="12" stroke-width="2" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Version compacte -->
    <div class="admin-compact" *ngIf="isCollapsed">
      <div class="compact-avatar" (click)="logout()" title="Déconnexion">
        <span>{{ admin.initials }}</span>
      </div>
    </div>
  </div>
</div>
