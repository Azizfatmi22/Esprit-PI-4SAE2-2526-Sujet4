apiVersion: apps/v1
kind: Deployment
metadata:
  name: certification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certification
  template:
    metadata:
      labels:
        app: certification
      # --- ADD THESE ANNOTATIONS ---
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8090"
      # -----------------------------
    spec:
      containers:
        - name: certification
          image: certification-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8090
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://host.docker.internal:3306/formini_db
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: root
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
            - name: SPRING_CLOUD_DISCOVERY_ENABLED
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: certification-service
spec:
  type: NodePort
  selector:
    app: certification
  ports:
    - port: 8090
      targetPort: 8090
      nodePort: 30090
