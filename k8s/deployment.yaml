apiVersion: apps/v1
kind: Deployment
metadata:
  name: certification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certification
  template:
    metadata:
      labels:
        app: certification
    spec:
      containers:
        - name: certification
          image: certification-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8090
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql-db:3306/formini_db
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: root
---
apiVersion: v1
kind: Service
metadata:
  name: certification-service
spec:
  type: NodePort
  selector:
    app: certification
  ports:
    - port: 8090
      targetPort: 8090
      nodePort: 30090