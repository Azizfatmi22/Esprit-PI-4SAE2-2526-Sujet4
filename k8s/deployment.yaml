apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evaluation
  template:
    metadata:
      labels:
        app: evaluation
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      containers:
      - name: evaluation
        image: omaraguil/evaluation-service:latest # Changé pour correspondre à l'image poussée
        imagePullPolicy: Always # Mis à Always pour récupérer la version du pipeline
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_DATASOURCE_URL
          # Utilisation du nom correct de la base
          value: jdbc:mysql://host.docker.internal:3306/formini_evaluation_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
        - name: SPRING_DATASOURCE_USERNAME
          value: root
        - name: SPRING_DATASOURCE_PASSWORD
          value: root
        - name: EUREKA_CLIENT_ENABLED
          value: "false"
        - name: SPRING_CLOUD_DISCOVERY_ENABLED
          value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: evaluation-service
  labels:
    app: evaluation
spec:
  type: NodePort
  selector:
    app: evaluation
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 30081
