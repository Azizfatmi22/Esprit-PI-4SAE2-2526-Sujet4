apiVersion: apps/v1
kind: Deployment
metadata:
  name: certification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certification
  template:
    metadata:
      labels:
        app: certification
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8090"
    spec:
      containers:
        - name: certification
          image: omaraguil/certification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://host.docker.internal:3306/formini_certification_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: root
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: certification-service
  labels:
    app: certification
spec:
  type: NodePort
  selector:
    app: certification
  ports:
    - name: http
      port: 8090
      targetPort: 8090
      nodePort: 30090
