apiVersion: apps/v1
kind: Deployment
metadata:
  name: path-and-schedule
spec:
  replicas: 1
  selector:
    matchLabels:
      app: path-and-schedule
  template:
    metadata:
      labels:
        app: path-and-schedule
    spec:
      containers:
        - name: path-and-schedule
          image: kthiriyoussef/path-and-schedule:latest
          ports:
            - containerPort: 8088
---
apiVersion: v1
kind: Service
metadata:
  name: path-and-schedule
spec:
  type: NodePort
  selector:
    app: path-and-schedule
  ports:
    - port: 8088
      targetPort: 8088
      nodePort: 30088
