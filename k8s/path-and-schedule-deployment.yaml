apiVersion: apps/v1
kind: Deployment
metadata:
  name: path-and-schedule
spec:
  replicas: 1
  selector:
    matchLabels:
      app: path-and-schedule
  template:
    metadata:
      labels:
        app: path-and-schedule
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8088"
    spec:
      containers:
        - name: path-and-schedule
          image: kthiriyoussef/path-and-schedule:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8088
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://host.docker.internal:3306/formini_path_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: root
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
            - name: SPRING_CLOUD_DISCOVERY_ENABLED
              value: "false"

---
apiVersion: v1
kind: Service
metadata:
  name: path-and-schedule
  labels:
    app: path-and-schedule
spec:
  type: NodePort
  selector:
    app: path-and-schedule
  ports:
    - name: http
      port: 8088
      targetPort: 8088
      nodePort: 30088
