apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: session-management
  template:
    metadata:
      labels:
        app: session-management
    spec:
      containers:
        - name: session-management
          image: kthiriyoussef/session-management:latest
          ports:
            - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: session-management
spec:
  type: NodePort
  selector:
    app: session-management
  ports:
    - port: 8082
      targetPort: 8082
      nodePort: 30080