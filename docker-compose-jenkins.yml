version: '3.8'
services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    privileged: true
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      # Mount docker sock if you ever want Jenkins to run Docker containers
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_data:
