apiVersion: v1
kind: Service
metadata:
  name: ms-course
spec:
  type: NodePort
  selector:
    app: ms-course
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8083
      nodePort: 30083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-course
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-course
  template:
    metadata:
      labels:
        app: ms-course
    spec:
      containers:
        - name: ms-course
          image: hazem114/mscourse:latest
          imagePullPolicy: Always
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-db:3306/coursera?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "root"
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: "com.mysql.cj.jdbc.Driver"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka-server:8761/eureka/"
          ports:
            - containerPort: 8083
